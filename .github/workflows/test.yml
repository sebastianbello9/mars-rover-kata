name: Testing

on:
  push:
    branches: [develop, main, master]
    paths:
      - 'src/**'
      - 'tst/**'
      - 'package.json'
      - 'yarn.lock'
      - 'tsconfig.json'
      - '.github/workflows/test.yml'
  pull_request:
    branches: [develop, main, master]
    paths:
      - 'src/**'
      - 'tst/**'
      - 'package.json'
      - 'yarn.lock'
      - 'tsconfig.json'
      - '.github/workflows/test.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  analyze:
    name: Static & Security Analysis
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'yarn'
      - name: Install dependencies
        run: yarn install --frozen-lockfile
      - name: Type check
        run: yarn tsc --noEmit
      - name: Security audit
        run: yarn audit --level high

  test:
    name: Tests
    timeout-minutes: 60
    runs-on: ubuntu-latest
    env:
      CI: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'yarn'
      - name: Install dependencies
        run: yarn install --frozen-lockfile
      - name: Run tests
        run: yarn test:cov
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: vitest-coverage
          path: coverage/
          retention-days: 30
